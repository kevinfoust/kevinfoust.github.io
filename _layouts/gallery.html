---
layout: default
---
<article class="gallery-page">
  <header class="gallery-header">
    <h1 class="gallery-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="gallery-description">{{ page.description }}</p>
    {% endif %}
  </header>

  {{ content }}

  <div class="gallery-grid">
    {% for image in page.images %}
    <a href="https://images.kevinfoust.com/{{ image }}" class="gallery-item" target="_blank">
      <img src="https://images.kevinfoust.com/{{ image }}" loading="lazy" alt="">
    </a>
    {% endfor %}
  </div>
</article>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <span class="lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1)">&#10094;</span>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
  <span class="lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1)">&#10095;</span>
</div>

<script>
const items = document.querySelectorAll('.gallery-item');
let currentIndex = 0;

items.forEach((item, index) => {
  item.addEventListener('click', (e) => {
    e.preventDefault();
    currentIndex = index;
    openLightbox(item.href);
  });
});

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  lb.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.body.style.overflow = '';
}

function navigateLightbox(dir) {
  currentIndex = (currentIndex + dir + items.length) % items.length;
  document.getElementById('lightbox-img').src = items[currentIndex].href;
}

document.addEventListener('keydown', (e) => {
  const lb = document.getElementById('lightbox');
  if (lb.style.display !== 'flex') return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') navigateLightbox(1);
  if (e.key === 'ArrowLeft') navigateLightbox(-1);
});
</script>
